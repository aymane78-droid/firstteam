<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Vidéos YouTube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f; color: #fff; padding: 40px 20px; min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 30px; text-align: center; }
    .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
    .tab {
      background: #1f1f1f; color: #aaa; border: 2px solid transparent;
      padding: 12px 28px; border-radius: 30px; cursor: pointer;
      font-size: 1rem; font-weight: 600; transition: all 0.2s;
    }
    .tab:hover { background: #2a2a2a; color: #fff; }
    .tab.active { background: #ff0000; color: #fff; border-color: #ff0000; }
    .videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .video-card {
      background: #1f1f1f; border-radius: 12px; overflow: hidden;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .video-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(255, 0, 0, 0.2); }
    .video-thumbnail { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
    .video-thumbnail img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .play-icon {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 60px; height: 60px; background: rgba(255, 0, 0, 0.9); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .video-card:hover .play-icon { opacity: 1; }
    .play-icon::after {
      content: ""; width: 0; height: 0;
      border-left: 18px solid white; border-top: 12px solid transparent;
      border-bottom: 12px solid transparent; margin-left: 4px;
    }
    .video-info { padding: 15px; }
    .video-title {
      font-size: 1rem; font-weight: 600; margin-bottom: 8px; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .video-date { font-size: 0.85rem; color: #aaa; }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9); z-index: 1000;
      justify-content: center; align-items: center; padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content { width: 100%; max-width: 900px; position: relative; }
    .modal-close {
      position: absolute; top: -40px; right: 0; background: none; border: none;
      color: white; font-size: 2rem; cursor: pointer; padding: 5px 15px;
    }
    .video-wrapper {
      position: relative; padding-bottom: 56.25%; height: 0;
      overflow: hidden; border-radius: 12px;
    }
    .video-wrapper iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
    }
    .loading, .error { text-align: center; padding: 40px; color: #aaa; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 Mes dernières vidéos</h1>
    <div class="tabs">
      <button class="tab active" onclick="switchChannel('firstTeam', this)">First Team</button>
      <button class="tab" onclick="switchChannel('offense', this)">Offense</button>
    </div>
    <div id="videos-container">
      <div class="loading">Chargement des vidéos...</div>
    </div>
  </div>

  <div class="modal" id="videoModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeVideo()">✕</button>
      <div class="video-wrapper">
        <iframe id="videoPlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script>
    // ⚙️ CONFIGURATION
    const API_KEY = "AIzaSyA6A3OXhbQLOQHsS4R2vNa9Aqnp_e_aDnY";

    const CHANNELS = {
      firstTeam: { name: "First Team", id: "UCVVngTl-rdwFeFBUTdW5G5w" },
      offense:   { name: "Offense",    id: "UCltzJogga-SMLbzpVI_527g" }
    };

    const MAX_RESULTS = 15;
    const cache = {};

    async function loadVideos(channelKey) {
      const container = document.getElementById("videos-container");
      container.innerHTML = '<div class="loading">Chargement des vidéos...</div>';
      const channel = CHANNELS[channelKey];

      if (cache[channelKey]) {
        displayVideos(cache[channelKey]);
        return;
      }

      try {
        const url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${channel.id}&part=snippet,id&order=date&maxResults=${MAX_RESULTS}&type=video`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.error) throw new Error(data.error.message);
        if (!data.items || data.items.length === 0) {
          container.innerHTML = '<div class="error">Aucune vidéo trouvée.</div>';
          return;
        }

        cache[channelKey] = data.items;
        displayVideos(data.items);
      } catch (error) {
        container.innerHTML = `<div class="error">Erreur : ${error.message}</div>`;
        console.error("Erreur :", error);
      }
    }

    function displayVideos(items) {
      const container = document.getElementById("videos-container");
      const videosHTML = items.map((item) => {
        const videoId = item.id.videoId;
        const title = item.snippet.title;
        const thumbnail = item.snippet.thumbnails.high.url;
        const date = new Date(item.snippet.publishedAt).toLocaleDateString("fr-FR", {
          day: "numeric", month: "long", year: "numeric"
        });
        return `
          <div class="video-card" onclick="playVideo('${videoId}')">
            <div class="video-thumbnail">
              <img src="${thumbnail}" alt="${title}" loading="lazy">
              <div class="play-icon"></div>
            </div>
            <div class="video-info">
              <div class="video-title">${title}</div>
              <div class="video-date">${date}</div>
            </div>
          </div>
        `;
      }).join("");
      container.innerHTML = `<div class="videos-grid">${videosHTML}</div>`;
    }
